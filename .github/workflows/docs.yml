name: Docs

# Build + deploy the docs site to GitHub Pages independently of the release
# pipeline, so the site can be (re)published without cutting a release (and a
# release no longer has to succeed at Pages deploy to be considered done).
# `configure-pages` with `enablement: true` self-enables Pages, so the first
# run needs no manual repo setup.
on:
  workflow_dispatch:
  push:
    branches: [master]
    paths:
      - "docs/**"
      - "mkdocs.yml"
      - ".github/workflows/docs.yml"

permissions:
  contents: read

jobs:
  build:
    name: Build documentation site
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pages: write # required so configure-pages can self-enable Pages
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - uses: actions/configure-pages@v5
        with:
          enablement: true

      - name: Install package with docs tooling
        run: python -m pip install -e ".[dev,docs,config]"

      - name: Build docs
        run: mkdocs build --strict

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: site/

  deploy:
    name: Deploy documentation to GitHub Pages
    needs: build
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
